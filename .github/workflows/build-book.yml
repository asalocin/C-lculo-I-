name: Compilar libro PDF

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  compilar:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar LaTeX (TeX Live)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: false
          latexmk_shell_escape: false

      - name: Subir PDF como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: calculo-I.pdf
          path: main.pdf
